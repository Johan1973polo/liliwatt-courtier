<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILIWATT — Connexion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #7c3aed 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(217,70,239,0.15) 0%, transparent 70%);
    top: -200px;
    right: -200px;
  }

  body::after {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%);
    bottom: -150px;
    left: -150px;
  }

  .login-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand h1 {
    font-size: 36px;
    font-weight: 800;
    color: white;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .brand p {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .brand .line {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #7c3aed, #d946ef);
    margin: 16px auto 0;
    border-radius: 2px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
  }

  input::placeholder { color: rgba(255,255,255,0.3); }

  input:focus {
    border-color: #7c3aed;
    background: rgba(124,58,237,0.1);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
  }

  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #7c3aed, #d946ef);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.3s;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(124,58,237,0.4);
  }

  .error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .footer-text {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    margin-top: 32px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <h1>LILIWATT</h1>
    <p>Courtage Énergie B2B & B2C</p>
    <div class="line"></div>
  </div>

  <div class="error" id="errorMsg">Email ou mot de passe incorrect</div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.fr" autocomplete="email">
  </div>

  <div class="form-group">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" onclick="login()">Se connecter</button>

  <div class="footer-text">
    59 rue de Ponthieu, Bureau 326 — 75008 Paris
  </div>
</div>

<script>
  // Écouter la touche Entrée
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.style.display = 'none';

    try {
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('userRole', data.role);
        localStorage.setItem('userEmail', email);
        window.location.href = '/';
      } else {
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorMsg.style.display = 'block';
    }
  }
</script>
</body>
</html>
