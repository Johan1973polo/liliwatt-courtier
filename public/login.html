<!DOCTYPE html>
<html lang="fr">
<head>

<title>LILIWATT — Connexion</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  background: radial-gradient(ellipse at 40% 50%, #6d28d9 0%, #4c1d95 40%, #3b0764 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.icons-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.icon-svg {
  position: absolute;
  opacity: 0.22;
  fill: white;
  stroke: white;
  animation: floatIcon 7s ease-in-out infinite;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
}

@keyframes floatIcon {
  0%,100% { transform: translateY(0) rotate(0deg); }
  40% { transform: translateY(-14px) rotate(4deg); }
  70% { transform: translateY(7px) rotate(-3deg); }
}

.login-card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 24px;
  padding: 52px 44px 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.4);
}

.brand-title {
  text-align: center;
  font-size: 30px;
  font-weight: 900;
  letter-spacing: 5px;
  color: white;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.brand-sub {
  text-align: center;
  font-size: 10px;
  letter-spacing: 2.5px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
}

.brand-line {
  width: 36px;
  height: 2px;
  background: linear-gradient(90deg, #d946ef, #7c3aed);
  margin: 14px auto 38px;
  border-radius: 2px;
}

.field-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.8px;
  color: rgba(255,255,255,0.65);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.field-input {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  color: white;
  font-size: 15px;
  outline: none;
  transition: all 0.25s;
  margin-bottom: 22px;
}
.field-input::placeholder { color: rgba(255,255,255,0.3); }
.field-input:focus {
  border-color: #d946ef;
  background: rgba(217,70,239,0.1);
  box-shadow: 0 0 0 3px rgba(217,70,239,0.18);
}

.btn-login {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #c026d3, #7c3aed);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 6px;
  transition: all 0.25s;
  box-shadow: 0 8px 28px rgba(192,38,211,0.4);
}
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(192,38,211,0.5);
}

.error-msg {
  display: none;
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  color: #fca5a5;
  font-size: 13px;
  margin-bottom: 16px;
  text-align: center;
}

.footer-addr {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 28px;
}
</style>
</head>

<!-- Card -->
<div class="login-card">
  <div class="brand-title">LILIWATT</div>
  <div class="brand-sub">Courtage Énergie B2B &amp; B2C</div>
  <div class="brand-line"></div>

  <div id="errorMsg" class="error-msg">❌ Email ou mot de passe incorrect</div>

  <label class="field-label" for="email">Email</label>
  <input type="email" id="email" class="field-input" placeholder="votre@email.fr" autocomplete="email">

  <label class="field-label" for="password">Mot de passe</label>
  <input type="password" id="password" class="field-input" placeholder="••••••••" autocomplete="current-password">

  <button class="btn-login" onclick="login()">Se connecter</button>

  <div class="footer-addr">59 rue de Ponthieu, Bureau 326 — 75008 Paris</div>
</div>

<script>
document.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  if (!email || !password) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = '⚠️ Veuillez remplir tous les champs';
    return;
  }
  errorMsg.style.display = 'none';
  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await response.json();
    if (data.success) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      localStorage.setItem('userRole', data.user.role);
      localStorage.setItem('userEmail', email);
      window.location.href = '/';
    } else {
      errorMsg.style.display = 'block';
      errorMsg.textContent = '❌ Email ou mot de passe incorrect';
    }
  } catch (err) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = '❌ Erreur de connexion au serveur';
  }
}
</script>
