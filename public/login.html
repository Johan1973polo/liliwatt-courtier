<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILIWATT — Connexion</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 50%, #5b21b6 0%, #4c1d95 30%, #3b0f8c 60%, #2e0a7a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Icônes énergie flottantes */
.icons-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.icon-float {
  position: absolute;
  opacity: 0.18;
  color: white;
  font-size: 32px;
  animation: floatIcon 6s ease-in-out infinite;
  filter: drop-shadow(0 0 8px rgba(217,70,239,0.4));
}
.icon-float:nth-child(1)  { top: 8%;  left: 5%;  font-size:28px; animation-delay:0s; }
.icon-float:nth-child(2)  { top: 15%; left: 15%; font-size:22px; animation-delay:0.5s; }
.icon-float:nth-child(3)  { top: 5%;  left: 25%; font-size:36px; animation-delay:1s; }
.icon-float:nth-child(4)  { top: 35%; left: 3%;  font-size:30px; animation-delay:1.5s; }
.icon-float:nth-child(5)  { top: 55%; left: 8%;  font-size:24px; animation-delay:0.8s; }
.icon-float:nth-child(6)  { top: 70%; left: 18%; font-size:32px; animation-delay:2s; }
.icon-float:nth-child(7)  { top: 80%; left: 5%;  font-size:26px; animation-delay:0.3s; }
.icon-float:nth-child(8)  { top: 88%; left: 28%; font-size:20px; animation-delay:1.2s; }
.icon-float:nth-child(9)  { top: 10%; right: 5%; font-size:30px; animation-delay:0.7s; }
.icon-float:nth-child(10) { top: 5%;  right: 20%; font-size:38px; animation-delay:1.8s; }
.icon-float:nth-child(11) { top: 25%; right: 6%; font-size:24px; animation-delay:0.4s; }
.icon-float:nth-child(12) { top: 45%; right: 4%; font-size:28px; animation-delay:2.2s; }
.icon-float:nth-child(13) { top: 62%; right: 12%; font-size:34px; animation-delay:1s; }
.icon-float:nth-child(14) { top: 78%; right: 5%; font-size:22px; animation-delay:0.6s; }
.icon-float:nth-child(15) { top: 88%; right: 22%; font-size:26px; animation-delay:1.4s; }
.icon-float:nth-child(16) { top: 42%; left: 22%; font-size:18px; animation-delay:2.5s; }

/* Graphique tendance à gauche */
.chart-left {
  position: absolute;
  left: 3%;
  top: 45%;
  transform: translateY(-50%);
  opacity: 0.15;
  width: 220px;
}
.chart-left svg { width: 100%; }

/* Lignes de connexion */
.lines-bg {
  position: absolute;
  inset: 0;
  opacity: 0.08;
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(217,70,239,0.3) 0%, transparent 40%),
    radial-gradient(circle at 80% 50%, rgba(124,58,237,0.3) 0%, transparent 40%);
}

@keyframes floatIcon {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-12px) rotate(5deg); }
  66% { transform: translateY(6px) rotate(-3deg); }
}

/* Card */
.login-card {
  position: relative;
  z-index: 10;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 52px 44px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(217,70,239,0.1);
}

.brand-title {
  text-align: center;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 4px;
  color: white;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.brand-sub {
  text-align: center;
  font-size: 11px;
  letter-spacing: 2.5px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.brand-line {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, #d946ef, #7c3aed);
  margin: 12px auto 36px;
  border-radius: 2px;
}

.field-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.field-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  color: white;
  font-size: 15px;
  outline: none;
  transition: all 0.2s;
  margin-bottom: 20px;
}

.field-input::placeholder { color: rgba(255,255,255,0.35); }

.field-input:focus {
  border-color: #d946ef;
  background: rgba(217,70,239,0.08);
  box-shadow: 0 0 0 3px rgba(217,70,239,0.15);
}

.btn-login {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #d946ef, #7c3aed);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
  box-shadow: 0 8px 24px rgba(217,70,239,0.35);
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(217,70,239,0.45);
}

.btn-login:active { transform: translateY(0); }

.error-msg {
  display: none;
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  color: #fca5a5;
  font-size: 13px;
  margin-bottom: 16px;
  text-align: center;
}

.footer-addr {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 28px;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<!-- Icônes énergie flottantes -->
<div class="icons-bg">
  <div class="icon-float">🌬️</div>
  <div class="icon-float">🔥</div>
  <div class="icon-float">⚡</div>
  <div class="icon-float">🔌</div>
  <div class="icon-float">💧</div>
  <div class="icon-float">☀️</div>
  <div class="icon-float">🏭</div>
  <div class="icon-float">🌱</div>
  <div class="icon-float">🔋</div>
  <div class="icon-float">⚡</div>
  <div class="icon-float">💡</div>
  <div class="icon-float">🌬️</div>
  <div class="icon-float">🔌</div>
  <div class="icon-float">💧</div>
  <div class="icon-float">🌱</div>
  <div class="icon-float">☀️</div>
</div>

<!-- Graphique tendance gauche (SVG) -->
<div class="chart-left">
  <svg viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Barres -->
    <rect x="10" y="80" width="16" height="35" rx="3" fill="rgba(255,255,255,0.4)"/>
    <rect x="32" y="65" width="16" height="50" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="54" y="50" width="16" height="65" rx="3" fill="rgba(255,255,255,0.6)"/>
    <rect x="76" y="40" width="16" height="75" rx="3" fill="rgba(217,70,239,0.7)"/>
    <rect x="98" y="28" width="16" height="87" rx="3" fill="rgba(217,70,239,0.8)"/>
    <rect x="120" y="18" width="16" height="97" rx="3" fill="rgba(217,70,239,0.9)"/>
    <!-- Ligne tendance -->
    <polyline points="18,78 40,63 62,48 84,38 106,26 128,16 170,5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Flèche -->
    <path d="M162,2 L172,5 L165,12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
</div>

<div class="lines-bg"></div>

<!-- Card de connexion -->
<div class="login-card">
  <div class="brand-title">LILIWATT</div>
  <div class="brand-sub">Courtage Énergie B2B &amp; B2C</div>
  <div class="brand-line"></div>

  <div id="errorMsg" class="error-msg">❌ Email ou mot de passe incorrect</div>

  <label class="field-label" for="email">Email</label>
  <input type="email" id="email" class="field-input" placeholder="votre@email.fr" autocomplete="email">

  <label class="field-label" for="password">Mot de passe</label>
  <input type="password" id="password" class="field-input" placeholder="••••••••" autocomplete="current-password">

  <button class="btn-login" onclick="login()">Se connecter</button>

  <div class="footer-addr">59 rue de Ponthieu, Bureau 326 — 75008 Paris</div>
</div>

<script>
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  
  if (!email || !password) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = '⚠️ Veuillez remplir tous les champs';
    return;
  }
  
  errorMsg.style.display = 'none';
  
  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await response.json();
    
    if (data.success) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      localStorage.setItem('userRole', data.user.role);
      localStorage.setItem('userEmail', email);
      window.location.href = '/';
    } else {
      errorMsg.style.display = 'block';
      errorMsg.textContent = '❌ Email ou mot de passe incorrect';
    }
  } catch (err) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = '❌ Erreur de connexion au serveur';
  }
}
</script>
</body>
</html>
