<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILIWATT — Mon Équipe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #faf5ff; min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #4c1d95, #7c3aed);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left h1 { color: white; font-size: 22px; font-weight: 800; letter-spacing: 2px; }
.header-left p { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 2px; }
.header-right { display: flex; gap: 10px; align-items: center; }
.btn-header { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-retour { background: rgba(255,255,255,0.15); color: white; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; }
.btn-deconnexion { background: #ef4444; color: white; }

.container { max-width: 1000px; margin: 32px auto; padding: 0 20px; }

.badge-manager {
  display: inline-block;
  background: linear-gradient(135deg, #7c3aed, #d946ef);
  color: white;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 24px;
}

.section { margin-bottom: 32px; }
.section-title {
  font-size: 16px;
  font-weight: 700;
  color: #7c3aed;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #e9d5ff;
}

/* MECs en attente */
.mec-card {
  background: white;
  border: 1px solid #fde68a;
  border-left: 4px solid #f59e0b;
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.mec-info { font-size: 14px; color: #374151; }
.mec-info strong { color: #1e1b4b; }
.mec-info span { color: #9ca3af; font-size: 12px; margin-left: 8px; }
.btn-reprendre {
  padding: 8px 16px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

/* Accordéon vendeurs */
.vendeur-card {
  background: white;
  border: 1px solid #e9d5ff;
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
}
.vendeur-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  background: #faf5ff;
}
.vendeur-header:hover { background: #f3e8ff; }
.vendeur-name { font-weight: 700; color: #1e1b4b; font-size: 15px; }
.vendeur-body { display: none; padding: 0 18px 14px; }
.vendeur-body.open { display: block; }

.cat-title {
  font-size: 12px;
  font-weight: 700;
  margin: 12px 0 6px;
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
}
.cat-attente { background: #fef3c7; color: #d97706; }
.cat-signe { background: #d1fae5; color: #059669; }
.cat-perdu { background: #fee2e2; color: #dc2626; }

.client-item {
  background: #f9f9ff;
  border: 1px solid #e9d5ff;
  border-radius: 8px;
  margin-bottom: 6px;
  overflow: hidden;
}
.client-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
}
.client-header:hover { background: #f3e8ff; }
.client-body { display: none; padding: 0 14px 10px; }
.client-body.open { display: block; }

.doc-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #f3f4f6;
  font-size: 12px;
  color: #374151;
}
.doc-item:last-child { border: none; }

.btn-voir {
  padding: 4px 10px;
  background: #7c3aed;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
}

.btn-deplacer {
  margin-top: 8px;
  padding: 6px 12px;
  background: white;
  border: 1.5px solid #7c3aed;
  color: #7c3aed;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
  width: 100%;
}
.btn-deplacer:hover { background: #faf5ff; }

.empty { color: #9ca3af; font-size: 13px; padding: 12px 0; text-align: center; }
.spinner { width: 28px; height: 28px; border: 3px solid #e9d5ff; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal déplacement */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 16px; padding: 28px; width: 380px; }
.modal h3 { color: #7c3aed; margin-bottom: 16px; }
.modal-option { display: flex; gap: 10px; margin-top: 12px; }
.btn-signe { flex: 1; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
.btn-perdu { flex: 1; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
.btn-annuler { width: 100%; padding: 10px; background: white; border: 1.5px solid #e9d5ff; border-radius: 8px; cursor: pointer; color: #6b7280; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>⚡ LILIWATT</h1>
    <p>👑 Manager Commercial</p>
  </div>
  <div class="header-right">
    <a href="/" class="btn-retour">← Retour</a>
    <button class="btn-header btn-deconnexion" onclick="logout()">🚪 Déconnexion</button>
  </div>
</div>

<div class="container">
  <div class="badge-manager">👑 Manager Commercial — <span id="userEmail"></span></div>

  <!-- MECs en attente -->
  <div class="section">
    <div class="section-title">🔔 MECs en attente de mon équipe</div>
    <div id="mecsList"><div class="spinner"></div></div>
  </div>

  <!-- Portefeuille équipe -->
  <div class="section">
    <div class="section-title">📁 Portefeuille de mon équipe</div>
    <div id="vendeursList"><div class="spinner"></div></div>
  </div>
</div>

<!-- Modal déplacement -->
<div class="modal-overlay" id="moveModal">
  <div class="modal">
    <h3>🔄 Déplacer le dossier</h3>
    <p style="color:#9ca3af;font-size:13px;">Client : <strong id="moveClientName"></strong></p>
    <p style="color:#9ca3af;font-size:12px;margin-top:4px;">Actuellement dans : <strong id="moveFromCat"></strong></p>
    <div class="modal-option">
      <button class="btn-signe" onclick="confirmMove('CLIENTS SIGNÉS')">✅ Client signé</button>
      <button class="btn-perdu" onclick="confirmMove('CLIENTS PERDUS')">❌ Client perdu</button>
    </div>
    <button class="btn-annuler" onclick="closeMoveModal()">Annuler</button>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');
let moveTarget = null;

if (!token || (user.role !== 'referent' && user.role !== 'admin')) {
  window.location.href = '/';
}

document.getElementById('userEmail').textContent = user.email || '';

function logout() {
  localStorage.clear();
  window.location.href = '/';
}

async function loadMECs() {
  try {
    const res = await fetch('/api/notifications/referent', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const container = document.getElementById('mecsList');
    
    if (!data.notifications?.length) {
      container.innerHTML = '<p class="empty">Aucune MEC en attente</p>';
      return;
    }
    
    container.innerHTML = data.notifications.map(n => `
      <div class="mec-card">
        <div class="mec-info">
          <strong>${n.client_name || 'Client'}</strong>
          <span>— ${n.vendeur_email}</span>
          <span>${new Date(n.date).toLocaleDateString('fr-FR')}</span>
        </div>
        <button class="btn-reprendre" onclick="reprendreMEC('${n.id}')">
          📋 Reprendre
        </button>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('mecsList').innerHTML = '<p style="color:#ef4444;">Erreur: ' + e.message + '</p>';
  }
}

function reprendreMEC(notifId) {
  window.location.href = '/?reprendre=' + notifId;
}

async function loadVendeurs() {
  try {
    const res = await fetch('/api/vendeurs', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const mesVendeurs = user.mes_vendeurs || [];
    const vendeurs = (data.vendeurs || []).filter(v => mesVendeurs.includes(v.email));
    
    const container = document.getElementById('vendeursList');
    
    if (!vendeurs.length) {
      container.innerHTML = '<p class="empty">Aucun vendeur dans votre équipe</p>';
      return;
    }
    
    container.innerHTML = vendeurs.map((v, vi) => `
      <div class="vendeur-card">
        <div class="vendeur-header" onclick="toggleVendeur(${vi})">
          <div class="vendeur-name">👤 ${v.nom || v.email}</div>
          <span id="vchevron-${vi}" style="color:#9ca3af;font-size:12px;transition:transform 0.2s;">▼</span>
        </div>
        <div class="vendeur-body" id="vbody-${vi}">
          <div id="vcontent-${vi}" style="color:#9ca3af;font-size:13px;padding:12px 0;">
            Cliquez pour charger...
          </div>
        </div>
      </div>
    `).join('');
    
    window._mesVendeurs = vendeurs;
  } catch(e) {
    document.getElementById('vendeursList').innerHTML = '<p style="color:#ef4444;">Erreur: ' + e.message + '</p>';
  }
}

async function toggleVendeur(vi) {
  const body = document.getElementById('vbody-' + vi);
  const chevron = document.getElementById('vchevron-' + vi);
  const content = document.getElementById('vcontent-' + vi);
  
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
  
  if (!isOpen && content.textContent.includes('Cliquez')) {
    const vendeur = window._mesVendeurs[vi];
    content.innerHTML = '<div class="spinner"></div>';
    
    try {
      const res = await fetch('/api/drive/list-documents-referent?vendeurEmail=' + encodeURIComponent(vendeur.email), {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      
      const sections = [
        { key: 'attente', label: '🕐 Clients en attente', cls: 'cat-attente', cat: 'CLIENT EN ATTENTE' },
        { key: 'signe', label: '✅ Clients signés', cls: 'cat-signe', cat: 'CLIENTS SIGNÉS' },
        { key: 'perdu', label: '❌ Clients perdus', cls: 'cat-perdu', cat: 'CLIENTS PERDUS' }
      ];
      
      content.innerHTML = sections.map(sec => {
        const clients = data[sec.key] || [];
        if (!clients.length) return '';
        return `
          <div>
            <div class="cat-title ${sec.cls}">${sec.label} (${clients.length})</div>
            ${clients.map((client, ci) => `
              <div class="client-item">
                <div class="client-header" onclick="toggleClient('${vi}_${ci}')">
                  <span style="font-weight:600;font-size:13px;">🏢 ${client.name}</span>
                  <span style="color:#9ca3af;font-size:11px;">${client.files?.length || 0} doc(s) ▼</span>
                </div>
                <div class="client-body" id="cbody-${vi}_${ci}">
                  ${(client.files || []).map(f => `
                    <div class="doc-item">
                      <span>📄 ${f.name}</span>
                      <button class="btn-voir" onclick="viewDoc('${f.id}')">👁 Voir</button>
                    </div>
                  `).join('')}
                  ${sec.key === 'attente' ? `
                    <button class="btn-deplacer" onclick="openMoveModal('${client.id}', '${client.name}', '${sec.cat}', '${vendeur.drive_folder_id}')">
                      🔄 Déplacer ce client
                    </button>
                  ` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('') || '<p class="empty">Aucun document</p>';
      
    } catch(e) {
      content.innerHTML = '<p style="color:#ef4444;">Erreur: ' + e.message + '</p>';
    }
  }
}

function toggleClient(id) {
  const body = document.getElementById('cbody-' + id);
  body.classList.toggle('open');
}

async function viewDoc(fileId) {
  try {
    const res = await fetch('/api/drive/download/' + fileId, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) throw new Error('Non autorisé');
    const blob = await res.blob();
    window.open(URL.createObjectURL(blob), '_blank');
  } catch(e) {
    alert('Erreur: ' + e.message);
  }
}

function openMoveModal(folderId, clientName, fromCat, vendeurFolderId) {
  moveTarget = { folderId, clientName, fromCat, vendeurFolderId };
  document.getElementById('moveClientName').textContent = clientName;
  document.getElementById('moveFromCat').textContent = fromCat;
  document.getElementById('moveModal').classList.add('open');
}

function closeMoveModal() {
  document.getElementById('moveModal').classList.remove('open');
  moveTarget = null;
}

async function confirmMove(toCategory) {
  if (!moveTarget) return;
  try {
    const res = await fetch('/api/drive/move-folder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        folderId: moveTarget.folderId,
        vendeurFolderId: moveTarget.vendeurFolderId,
        fromCategory: moveTarget.fromCat,
        toCategory
      })
    });
    const data = await res.json();
    if (data.success) {
      alert('✅ Dossier déplacé vers ' + toCategory);
      closeMoveModal();
      loadVendeurs();
    } else {
      alert('Erreur: ' + data.error);
    }
  } catch(e) {
    alert('Erreur: ' + e.message);
  }
}

// Chargement initial
loadMECs();
loadVendeurs();
</script>
</body>
</html>
